name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  # collect.yml이 jobs.json을 커밋하면 이 워크플로도 트리거됨
  workflow_run:
    workflows: ['Collect Jobs']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_PAGES: 'true'
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npx gh-pages -d dist --message "deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
